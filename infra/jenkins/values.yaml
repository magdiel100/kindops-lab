controller:
  admin:
    username: admin
    password: admin
    createSecret: true
  serviceType: NodePort
  nodePort: 32080
  resources:
    requests:
      cpu: "300m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1536Mi"
  installPlugins:
    - kubernetes:4423.vb_59f230b_ce53
    - workflow-aggregator:596.v8c21c963d92d
    - git:5.10.0
    - github:1.46.0
    - docker-workflow:634.vedc7242b_eda_7
    - credentials-binding:702.vfe613e537e88
    - matrix-auth:3.2.2
    - job-dsl:1.87
    - configuration-as-code:2006.v001a_2ca_6b_574
  jenkinsUrlProtocol: "http"
  jenkinsUrl: "localhost:8080"
  healthProbes: true
  probes:
    startupProbe:
      failureThreshold: 40
      periodSeconds: 10
      timeoutSeconds: 5
  initializeOnce: true
  installLatestPlugins: false
  image:
    pullPolicy: IfNotPresent
  ingress:
    enabled: false

persistence:
  enabled: true
  size: 8Gi
